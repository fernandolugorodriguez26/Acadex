<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Mis Materias</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" color="light">

  <ion-card class="form-card">
    <ion-card-header>
      <ion-card-title>Registrar Asignatura</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <form [formGroup]="subjectForm" (ngSubmit)="addSubject()">
        
        <ion-item fill="outline" class="ion-margin-bottom">
          <ion-input label="Código (Ej. ISW411) *" labelPlacement="floating" type="text" formControlName="code" autocapitalize="characters"></ion-input>
        </ion-item>

        <ion-item fill="outline" class="ion-margin-bottom">
          <ion-input label="Nombre de la materia *" labelPlacement="floating" type="text" formControlName="name"></ion-input>
        </ion-item>
        
        <ion-item fill="outline" class="ion-margin-bottom">
          <ion-input label="Profesor / Facilitador *" labelPlacement="floating" type="text" formControlName="professor"></ion-input>
        </ion-item>

        <ion-button expand="block" type="submit" [disabled]="subjectForm.invalid">
          Guardar Materia
        </ion-button>
      </form>
    </ion-card-content>
  </ion-card>

  <h3 class="section-title ion-padding-start">Materias Registradas</h3>

  <ion-list class="transparent-list" *ngIf="subjects$ | async as subjects">
    <ion-item-sliding *ngFor="let subject of subjects">
      <ion-item class="subject-item">
        <ion-label>
          <h2>
            {{ subject.name }}
            <ion-badge color="tertiary" style="margin-left: 8px;">{{ subject.code }}</ion-badge>
          </h2>
          <p><ion-icon name="person-outline"></ion-icon> {{ subject.professor }}</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="confirmDelete(subject.id)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
    
    <div class="empty-state" *ngIf="subjects.length === 0">
      <p>Aún no has registrado ninguna materia.</p>
    </div>
  </ion-list>

</ion-content>
