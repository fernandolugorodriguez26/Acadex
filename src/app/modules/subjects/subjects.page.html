<ion-header class="ion-no-border">
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Mis Materias</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" color="light">
  
  <ion-card class="form-card">
    <ion-card-header>
      <ion-card-title>Registrar Asignatura</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <form [formGroup]="subjectForm" (ngSubmit)="addSubject()">
        <ion-item fill="outline" class="ion-margin-bottom">
          <ion-input label="Nombre de la materia *" labelPlacement="floating" formControlName="name" placeholder="Ej. Seminario de Proyectos II"></ion-input>
        </ion-item>
        
        <ion-item fill="outline" class="ion-margin-bottom">
          <ion-input label="Profesor *" labelPlacement="floating" formControlName="professor" placeholder="Ej. Joan Manuel Gregorio Pérez"></ion-input>
        </ion-item>

        <ion-button expand="block" color="secondary" type="submit" [disabled]="subjectForm.invalid">
          Guardar Materia
        </ion-button>
      </form>
    </ion-card-content>
  </ion-card>

  <h3 class="section-title ion-padding-start">Materias Registradas</h3>

  <ion-list class="transparent-list" *ngIf="subjects$ | async as subjects">
    <ion-item-sliding *ngFor="let sub of subjects">
      <ion-item class="subject-item">
        <ion-icon name="book" slot="start" color="secondary"></ion-icon>
        <ion-label>
          <h2>{{ sub.name }}</h2>
          <p>Prof: {{ sub.professor }}</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="confirmDelete(sub.id)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>

    <div class="empty-state" *ngIf="subjects.length === 0">
      <p>Aún no tienes asignaturas registradas.</p>
    </div>
  </ion-list>

</ion-content>
