<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>
      <strong>Acadex</strong> Dashboard
    </ion-title>

    <ion-buttons slot="end">
      <div class="profile-trigger" routerLink="/profile">
        <div class="user-info">
          <p class="greeting">Hola,</p>
          <p class="name">{{ userName }}</p>
        </div>
        <div class="avatar-wrapper">
          <ion-avatar>
            <img [src]="userPhoto || 'https://ui-avatars.com/api/?name=' + userName + '&background=3880ff&color=fff'" alt="Avatar" />
          </ion-avatar>
          <span class="status-dot"></span>
        </div>
      </div>
      <ion-button (click)="logout()" color="danger" class="ion-margin-start">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" color="light">
  
  <ion-card class="calendar-card" style="display: flex; flex-direction: column;">
    <ion-datetime
      presentation="date"
      [highlightedDates]="highlightedDates"
      (ionChange)="onDateChange($event)"
      size="cover">
    </ion-datetime>
    
    <ion-button expand="block" fill="clear" color="tertiary" (click)="triggerIcsUpload()" style="margin: 0; border-top: 1px solid rgba(128,128,128,0.1);">
      <ion-icon name="sync-outline" slot="start"></ion-icon>
      Sincronizar Calendario UAPA (.ics)
    </ion-button>
  </ion-card>

  <input type="file" id="ics-upload-dashboard" accept=".ics" style="display: none;" (change)="onIcsSelected($event)">

  <div class="section-header ion-padding-start ion-padding-end">
    <h3 class="section-title">Entregas de la fecha</h3>
    <ion-button fill="clear" size="small" color="secondary" routerLink="/subjects">
      <ion-icon slot="start" name="library-outline"></ion-icon>
      Materias
    </ion-button>
  </div>
  
  <div *ngIf="selectedDateTasks.length > 0">
    <ion-list class="transparent-list">
      <ion-item *ngFor="let task of selectedDateTasks" class="task-item">
        
        <ion-checkbox 
          slot="start" 
          [checked]="task.isCompleted" 
          (ionChange)="toggleComplete(task)">
        </ion-checkbox>
        
        <ion-label>
          <h2 [class.completed-text]="task.isCompleted">
            {{ task.title }}
            <ion-badge *ngIf="task.priority" [color]="getPriorityColor(task.priority)" style="font-size: 0.65rem; margin-left: 5px;">
              {{ task.priority }}
            </ion-badge>
          </h2>
          <p class="subject-badge">
            <ion-icon name="folder-outline"></ion-icon> {{ task.category || 'Tarea' }} &bull; 
            <ion-icon name="book-outline"></ion-icon> {{ task.subjectName }}
          </p>
          <p *ngIf="task.attachmentUrl" style="margin-top: 5px;">
            <a [href]="task.attachmentUrl" target="_blank" style="text-decoration: none; color: var(--ion-color-secondary);">
              <ion-icon name="document-attach-outline"></ion-icon> Ver {{ task.fileName || 'Adjunto' }}
            </a>
          </p>
        </ion-label>
        
      </ion-item>
    </ion-list>
  </div>

  <div class="empty-state" *ngIf="selectedDateTasks.length === 0">
    <ion-icon name="checkmark-circle-outline" size="large" color="medium"></ion-icon>
    <p>Día libre. ¡No hay tareas para esta fecha!</p>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/tasks" color="tertiary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
